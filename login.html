<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Study Desk</title>
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="logo"><img src="styles/images/sdlogo.svg" alt="Site Logo"></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="tasks.html">Tasks</a>
            <a href="timer.html">Timer</a>
            <a href="tunes.html">Tunes</a>
        </div>
        <div class="nav-auth" id="navAuth"></div>
    </nav>

    <main class="page-content auth-page">
        <section class="auth-card">
            <h1 class="auth-title">Log in</h1>
            <form class="auth-form" id="loginForm" novalidate>
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" name="email" required autocomplete="email" placeholder="you@example.com">

                <label for="loginPassword">Password</label>
                <div class="auth-password-wrap">
                    <input type="password" id="loginPassword" name="password" required autocomplete="current-password" placeholder="••••••••">
                    <button type="button" class="auth-toggle-password" id="loginShowPassword" aria-label="Show password">Show</button>
                </div>

                <p class="auth-error" id="loginError" aria-live="polite"></p>

                <button type="submit" class="auth-submit-btn">Sign in</button>
            </form>
            <p class="auth-switch">
                Don't have an account? <a href="sign-up.html">Sign up</a>
            </p>
        </section>
    </main>

    <footer class="site-footer">
        Study Desk &copy; 2026
    </footer>
    <script src="scripts/data-store.js"></script>
    <script type="module" src="scripts/login.js"></script>
    <script type="module" src="scripts/auth-forms.js"></script>
    <script src="scripts/timer-notifier.js" defer></script>
</body>
</html>
