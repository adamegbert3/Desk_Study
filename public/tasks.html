<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Desk Study</title>
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/tasks.css">
    <script type="module" src="scripts/tasks.js"></script>
</head>

<body>
    <nav class="main-nav">
        <a href="index.html" class="logo"><img src="styles/images/sdlogo.svg" alt="Site Logo"></a>
        <div class="nav-links">
            <a href="index.html" aria-label="Home">
                <img src="styles/images/icons/home.svg" alt="" aria-hidden="true"><span class="nav-label">Home</span>
            </a>
            <a href="tasks.html" class="active" aria-label="Tasks">
                <img src="styles/images/icons/checkMark.svg" alt="" aria-hidden="true"><span class="nav-label">Tasks</span>
            </a>
            <a href="timer.html" aria-label="Timer">
                <img src="styles/images/icons/timer.svg" alt="" aria-hidden="true"><span class="nav-label">Timer</span>
            </a>
            <a href="tunes.html" aria-label="Tunes">
                <img src="styles/images/icons/musicNote.svg" alt="" aria-hidden="true"><span class="nav-label">Tunes</span>
            </a>
        </div>
        <div class="nav-auth" id="navAuth"></div>
    </nav>

    <div class="page-content">
        <div class="tasks-page">
            <!-- Left panel: Due Today -->
            <aside class="tasks-due-today">
                <div class="tasks-panel-header">
                    <h2 class="due-today-title">Due Today</h2>
                    <button type="button" class="panel-toggle-btn" id="toggleDueTodayBtn" aria-label="Collapse due today">
                        <img id="dueTodayToggleIcon" src="styles/images/icons/collapse content.svg" alt="">
                    </button>
                </div>
                <div class="tasks-panel-body" id="dueTodayPanelBody">
                    <ul class="due-today-list" aria-label="Tasks due today">
                        <!-- Populated by JS -->
                    </ul>
                    <p class="due-today-more" hidden></p>
                </div>
            </aside>

            <!-- Right panel: Add task + groups -->
            <main class="tasks-main">
                <div class="tasks-panel-header">
                    <h2 class="tasks-main-title">Groups</h2>
                    <div class="panel-controls">
                        <button type="button" class="panel-toggle-btn" id="toggleGroupsBtn" aria-label="Collapse groups panel">
                            <img id="groupsToggleIcon" src="styles/images/icons/collapse content.svg" alt="">
                        </button>
                    </div>
                </div>
                <div class="tasks-panel-body" id="groupsPanelBody">
                    <div class="add-group-wrap">
                        <button type="button" class="add-group-btn" id="addGroupBtn" aria-haspopup="dialog" aria-expanded="false">Add Group +</button>
                    </div>
                    <div class="task-groups" id="taskGroups">
                        <!-- Group cards populated by JS -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Entity modal: add group, subgroup, or task -->
    <div class="modal" id="entityModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc" hidden>
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Add</h2>
            <p class="modal-desc" id="modalDesc">Fill in the details below.</p>
            <form class="add-task-form" id="entityForm" novalidate>
                <div id="modalFields">
                    <!-- Fields populated by JS based on context (group, subgroup, task) -->
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="modalCancel">Cancel</button>
                    <button type="submit" class="btn-add-task" id="modalSubmit">Add</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        Study Desk &copy; 2026
    </footer>
    <script src="scripts/data-store.js"></script>
    <script type="module" src="scripts/login.js"></script>
    <script src="scripts/timer-notifier.js" defer></script>
</body>

</html>
