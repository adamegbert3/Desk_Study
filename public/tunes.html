<select id="hymnSelect" class="sound-btn dropdown-select">

</select>

    <button class="sound-btn" onclick="toggleSpotify()">
        Spotify Player
    </button>
    <div id="spotify-container" style="display: none; margin-top: 15px;">
        <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/artist/1GRl6sRyLg9ToOohIE2wW5?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>
</aside>

            <!-- Right: Now playing + play button -->
            <section class="tunes-right">
                <p class="tunes-header">Now Playing: &nbsp;<span id="track-name">Rain</span></p>
                <main>
                    <div class="player-card">
                        <div class="player-controls">
                            
                            <!-- <button class="control-btn">≡</button> 
                            
                            <button class="control-btn">⏮</button> -->
                            
                            <button class="control-btn play-pause-btn" id="playBtn" onclick="togglePlay()">
                                ▶
                            </button>

                            <p class="tunes-header"> <span class="now-playing-wave" id="nowPlayingWave" aria-hidden="true"> <span></span><span></span><span></span> </span> </p>
                            
                            <!-- <button class="control-btn">⏭</button>
                            
                            <button class="control-btn">♥</button> -->
                        </div>
                        
                    </div>
                    
                    
                    <audio id="audio-player" loop></audio>
                </main>
                
            </section>
        </div>
